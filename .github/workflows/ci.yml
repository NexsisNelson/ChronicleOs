name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  python-tests:
    name: Python tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install agents test dependencies
        working-directory: apps/agents
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run agents tests
        working-directory: apps/agents
        run: python -m pytest tests

      - name: Install adapter test dependencies
        working-directory: packages/memwal-adapter
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run adapter tests
        working-directory: packages/memwal-adapter
        run: python -m pytest tests

  dashboard-build:
    name: Dashboard build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/dashboard/package.json

      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm install

      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build

  live-integration-sanity:
    name: Live integration workflow file check
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check live integration workflow exists
        run: test -f .github/workflows/live-integration.yml

