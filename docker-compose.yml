version: '3.8'

services:
  # Phase 2: Local MemWal instance (placeholder)
  memwal:
    image: memwal/memwal:latest
    ports:
      - "8000:8000"
    environment:
      RUST_LOG: info
    volumes:
      - memwal_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 3: Optional - local Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  memwal_data:
