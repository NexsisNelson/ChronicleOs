[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "memwal-adapter"
version = "0.1.0"
description = "MemWal integration adapter for AI frameworks"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "ChronicleOS Team" }]
dependencies = [
  "httpx>=0.25.0",
  "memwal>=0.1.4",
  "pydantic>=2.12.5,<2.13",
  "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
langchain = ["langchain>=0.1.0"]
langgraph = ["langgraph>=0.1.0"]
autogen = ["pyautogen>=0.2.0"]
dev = [
  "pytest>=7.4.0",
  "pytest-asyncio>=0.21.0",
  "black>=23.0.0",
  "ruff>=0.1.0",
  "mypy>=1.5.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
