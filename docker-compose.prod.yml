version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - apps/dashboard/.env.example
    environment:
      NEXT_PUBLIC_MEMWAL_API: http://memwal:8000
      NEXT_PUBLIC_WALRUS_GATEWAY: http://walrus:8000
      NEXT_PUBLIC_LOG_LEVEL: info
      NEXT_PUBLIC_ENABLE_DEV_TOOLS: 'false'
    depends_on:
      memwal:
        condition: service_healthy
      walrus:
        condition: service_healthy

  memwal:
    image: memwal/memwal:latest
    ports:
      - '8000:8000'
    environment:
      RUST_LOG: info
    volumes:
      - memwal_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  walrus:
    image: walrus/walrus:latest
    ports:
      - '8001:8000'
    environment:
      WALRUS_LISTEN_ADDR: 0.0.0.0:8000
      LOG_LEVEL: info
    volumes:
      - walrus_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  memwal_data:
  walrus_data:
